services:
  cafofo-zap:
    image: ghcr.io/leandro-rocha/cafofo-zap:latest
    container_name: cafofo-zap
    restart: unless-stopped
    environment:
      - PORT=3010
      - DB_PATH=/data/cafofo-zap.db
      - WA_DATA_DIR=/data
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - NOTIFY_GROUP_ID=${NOTIFY_GROUP_ID:-}
    volumes:
      - zap-data:/data
    ports:
      - "3010:3010"

volumes:
  zap-data:
