<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cafofo Zap — Logs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0C0F16;
      --surface: #141820;
      --border:  #252B38;
      --text:    #C8CDD8;
      --text2:   #6B7280;
      --text3:   #3B4252;
      --green:   #22C55E;
      --amber:   #F59E0B;
      --red:     #EF4444;
      --mono:    'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12.5px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #toolbar {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #stream-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text3); flex-shrink: 0;
      transition: background .3s, box-shadow .3s;
    }
    #stream-dot.live { background: var(--green); box-shadow: 0 0 7px var(--green); }

    #toolbar-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 12px; font-weight: 600;
      letter-spacing: 0.09em; text-transform: uppercase;
      color: var(--text2);
    }

    .spacer { flex: 1; }

    .tb-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text2); padding: 4px 10px;
      border-radius: 5px; cursor: pointer;
      font-size: 11.5px; font-family: var(--mono);
      transition: color .1s, border-color .1s;
    }
    .tb-btn:hover { color: var(--text); border-color: #3B4252; }

    .tb-label {
      font-size: 11.5px; color: var(--text2);
      display: flex; align-items: center; gap: 5px;
      cursor: pointer; user-select: none;
    }
    .tb-label input { accent-color: var(--green); cursor: pointer; }

    a.tb-back {
      color: var(--text2); font-size: 11.5px;
      text-decoration: none; transition: color .1s;
    }
    a.tb-back:hover { color: var(--text); }

    #log {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    #log::-webkit-scrollbar { width: 4px; }
    #log::-webkit-scrollbar-track { background: var(--bg); }
    #log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .line {
      display: flex; gap: 12px;
      padding: 2px 14px;
      line-height: 1.6;
      border-left: 2px solid transparent;
      transition: background .05s;
    }
    .line:hover { background: rgba(255,255,255,.025); }

    .ts {
      color: var(--text3);
      flex-shrink: 0;
      font-size: 11.5px;
      min-width: 64px;
      padding-top: 1px;
    }

    .msg {
      flex: 1;
      word-break: break-all;
      white-space: pre-wrap;
      color: var(--text);
    }

    .line-error { border-left-color: var(--red); }
    .line-error .msg { color: #FCA5A5; }
    .line-error .ts  { color: rgba(239,68,68,.4); }

    .line-warn { border-left-color: var(--amber); }
    .line-warn .msg { color: #FCD34D; }
    .line-warn .ts  { color: rgba(245,158,11,.4); }

    #empty-state {
      display: flex; align-items: center; justify-content: center;
      height: 100%;
      color: var(--text3);
      font-size: 12px;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <div id="stream-dot"></div>
    <span id="toolbar-title">Logs</span>
    <span class="spacer"></span>
    <label class="tb-label">
      <input type="checkbox" id="autoscroll" checked>
      auto-scroll
    </label>
    <button class="tb-btn" onclick="clearLog()">limpar</button>
    <a href="/" class="tb-back">← admin</a>
  </div>
  <div id="log">
    <div id="empty-state">Aguardando logs…</div>
  </div>

  <script>
    const logEl = document.getElementById('log');
    const dot = document.getElementById('stream-dot');
    const autoscroll = document.getElementById('autoscroll');
    let lineCount = 0;

    function fmt(ts) {
      return new Date(ts).toLocaleTimeString('pt-BR', { hour12: false });
    }

    function appendLine({ ts, level, text }) {
      const empty = document.getElementById('empty-state');
      if (empty) empty.remove();

      lineCount++;
      const el = document.createElement('div');
      const lvl = level === 'error' ? ' line-error' : level === 'warn' ? ' line-warn' : '';
      el.className = 'line' + lvl;
      el.innerHTML = `<span class="ts">${fmt(ts)}</span><span class="msg">${text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>`;
      logEl.appendChild(el);

      if (autoscroll.checked) logEl.scrollTop = logEl.scrollHeight;

      if (lineCount > 2000) {
        const first = logEl.querySelector('.line');
        if (first) { first.remove(); lineCount--; }
      }
    }

    function clearLog() {
      logEl.innerHTML = '<div id="empty-state">Logs limpos</div>';
      lineCount = 0;
    }

    fetch('/logs/history').then(r => r.json()).then(lines => lines.forEach(appendLine));

    const es = new EventSource('/logs/stream');
    es.onopen  = () => dot.classList.add('live');
    es.onerror = () => dot.classList.remove('live');
    es.onmessage = e => appendLine(JSON.parse(e.data));
  </script>
</body>
</html>
