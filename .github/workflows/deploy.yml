name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        run: echo "OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.OWNER }}/cafofo-zap:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trigger:
    needs: build
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Trigger deploy
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/Leandro-Rocha/cafofo-deploy/actions/workflows/deploy.yml/dispatches \
            -d '{
              "ref": "main",
              "inputs": {
                "service": "cafofo-zap",
                "build_result": "${{ needs.build.result }}",
                "actor": "${{ github.actor }}",
                "branch": "${{ github.ref_name }}",
                "commit": ${{ toJson(github.event.head_commit.message) }}
              }
            }'
